name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @langtube/core build
      - run: pnpm --filter @langtube/cloud-adapters build
      - run: pnpm --filter @langtube/cli build
      - run: pnpm validate-pack data/materials/ted-ja-social-engineering-001
      - run: pnpm --filter @langtube/web build

  docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t langtube:latest .

  tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: pnpm install
      - run: pnpm --filter @langtube/core build
      - run: pnpm --filter @langtube/cloud-adapters build
      - name: Generate Tauri icons
        run: node scripts/generate-tauri-icons.mjs
      - name: Verify Tauri Rust crate
        working-directory: apps/desktop/src-tauri
        run: cargo check
